<!doctype html>
<html>
<link rel="stylesheet" href="/static/style.css">
<head><meta charset="utf-8"><title>Edit - {{ app_name }}</title></head>

<body>
<main>
    <h1>{{ "New author" if not author else "Edit author" }}</h1>

    <div class="nav">
        <a class="button" href="/admin">Back to admin</a>
    </div>

    <div class="card">
        <form method="post" action="{{ '/admin/author/new' if not author else '/admin/author/edit/' ~ author.id }}">
            <label>First name <input name="first_name" value="{{ '' if not author else author.first_name }}"></label><br>
            <label>Last name <input name="last_name" value="{{ '' if not author else author.last_name }}"></label><br>
            <label>Affiliations</label><br>
            <select name="affiliation_ids" multiple size="8">
                {% for aff in affiliations %}
                <option value="{{ aff.id }}"
                        {% if author and aff in author.affiliations %}selected{% endif %}>
                    {{ aff.short_name }} — {{ aff.full_address() }}
                </option>
                {% endfor %}
            </select>
            <br><small>Ctrl/Cmd to select several.</small><br>
            <label>Email <input name="email" value="{{ '' if not author else author.email }}"></label><br>
            <label>ORCID <input name="orcid" value="{{ '' if not author else author.orcid }}"></label><br><br>
            <label>Member since <input name="member_since" value="{{ '' if not author else author.member_since }}">
            </label><br><small>Use format YYYY/mm.</small><br>
            <label><input type="checkbox" name="qualified" {% if author and author.qualified %}checked{% endif %}> Qualified</label><br>
            <label><input type="checkbox" name="active" {% if author and author.active %}checked{% endif %}> Active</label><br><br>

            <button type="submit">Save</button>
        </form>
    </div>
    <p><a href="/admin">Back to list</a></p>
</main>
</body>
</html>
